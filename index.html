<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BillJobs — Creative Production House</title>
<meta name="description" content="BillJobs is a creative production house for music, fashion and talent.">
<meta property="og:title" content="BillJobs — Creative Production House">
<meta property="og:image" content="https://www.billjobs.it/assets/img/who_is_billjobs.jpg">
<meta property="og:url" content="https://www.billjobs.it">
<meta property="og:type" content="website">
<link rel="canonical" href="https://www.billjobs.it">
<link rel="icon" type="image/png" href="assets/img/logo_billjobs.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black: #000;
  --white: #fff;
  --grey: rgba(255,255,255,0.45);
  --font-ui: 'Space Grotesk', -apple-system, sans-serif;
  --font-ed: 'DM Serif Display', Georgia, serif;
}

html, body {
  width: 100%; height: 100%;
  background: var(--black);
  color: var(--white);
  font-family: var(--font-ui);
  -webkit-font-smoothing: antialiased;
  overflow: hidden; /* lock scroll on homepage */
}

a { color: inherit; text-decoration: none; }

/* ─────────────────────────────────────────
   SLIDESHOW
───────────────────────────────────────── */
.slideshow {
  position: fixed;
  inset: 0;
  z-index: 0;
}

.slide {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 1.2s ease;
  pointer-events: none;
}

.slide.active {
  opacity: 1;
  pointer-events: all;
}

/* Gradient overlay — darker at top for logo legibility */
.slide::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to bottom,
      rgba(0,0,0,0.55) 0%,
      rgba(0,0,0,0.05) 35%,
      rgba(0,0,0,0.05) 60%,
      rgba(0,0,0,0.65) 100%);
  z-index: 1;
}

/* Video fills the slide */
.slide video {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
}

/* On mobile show portrait video, hide landscape */
.slide video.desktop { display: block; }
.slide video.mobile  { display: none; }

/* Placeholder background when no video yet */
.slide-bg {
  position: absolute;
  inset: 0;
  background: #0a0a0a;
}

/* ─────────────────────────────────────────
   HEADER — fixed overlay
───────────────────────────────────────── */
.site-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 0 5vw;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.6s ease;
}

.site-header.visible {
  opacity: 1;
  pointer-events: all;
}

/* Logo row */
.logo-row {
  display: flex;
  align-items: baseline;
  padding-top: 24px;
}

.logo {
  font-family: var(--font-ui);
  font-size: clamp(48px, 12vw, 130px);
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1;
  color: var(--white);
  text-transform: uppercase;
  cursor: pointer;
}

/* Nav row */
.main-nav {
  display: flex;
  gap: 0;
  padding-top: 6px;
  padding-bottom: 0;
}

.main-nav a {
  font-size: clamp(9px, 1vw, 11px);
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--grey);
  margin-right: 28px;
  transition: color 0.2s;
}

.main-nav a:hover { color: var(--white); }

/* Filter row — categories */
.filter-nav {
  display: flex;
  gap: 0;
  padding-top: 10px;
}

.filter-btn {
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
  font-family: var(--font-ui);
  font-size: clamp(9px, 1vw, 11px);
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--grey);
  margin-right: 28px;
  transition: color 0.2s;
  position: relative;
}

.filter-btn::after {
  content: '';
  position: absolute;
  bottom: -3px;
  left: 0; right: 0;
  height: 1px;
  background: var(--white);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.25s ease;
}

.filter-btn.active { color: var(--white); }
.filter-btn.active::after { transform: scaleX(1); }
.filter-btn:hover { color: rgba(255,255,255,0.7); }

/* ─────────────────────────────────────────
   PROJECT INFO — bottom left
───────────────────────────────────────── */
.slide-info {
  position: fixed;
  bottom: 52px;
  left: 5vw;
  z-index: 100;
  opacity: 0;
  transition: opacity 0.4s ease, transform 0.4s ease;
  transform: translateY(6px);
}

.slide-info.visible {
  opacity: 1;
  transform: translateY(0);
}

.info-client {
  font-size: clamp(11px, 1.1vw, 13px);
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--white);
  display: inline;
  margin-right: 8px;
}

.info-title {
  font-size: clamp(11px, 1.1vw, 13px);
  font-weight: 300;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--grey);
  display: inline;
}

/* ─────────────────────────────────────────
   PAGINATION — bottom center
───────────────────────────────────────── */
.pagination {
  position: fixed;
  bottom: 48px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 20px;
  opacity: 0;
  transition: opacity 0.6s ease;
}

.pagination.visible { opacity: 1; }

.page-btn {
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
  font-family: var(--font-ui);
  font-size: clamp(10px, 1vw, 12px);
  font-weight: 400;
  letter-spacing: 0.06em;
  color: var(--grey);
  transition: color 0.25s;
  line-height: 1;
}

.page-btn.active { color: var(--white); font-weight: 600; }
.page-btn:hover  { color: rgba(255,255,255,0.7); }

/* Progress bar below active number */
.page-btn::after {
  content: '';
  display: block;
  height: 1px;
  background: var(--white);
  margin-top: 4px;
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s ease;
}

.page-btn.active::after { transform: scaleX(1); }

/* ─────────────────────────────────────────
   AUTO-PROGRESS BAR
───────────────────────────────────────── */
.progress-bar {
  position: fixed;
  bottom: 0; left: 0;
  height: 2px;
  width: 0%;
  background: rgba(255,255,255,0.6);
  z-index: 100;
  transition: none;
}

/* ─────────────────────────────────────────
   FOOTER STRIP — very bottom
───────────────────────────────────────── */
.site-footer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 5vw;
  height: 40px;
  border-top: 1px solid rgba(255,255,255,0.08);
  opacity: 0;
  transition: opacity 0.6s ease;
}

.site-footer.visible { opacity: 1; }

.footer-link {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--grey);
  transition: color 0.2s;
}
.footer-link:hover { color: var(--white); }

/* ─────────────────────────────────────────
   MOBILE
───────────────────────────────────────── */
@media (max-width: 767px) {
  .slide video.desktop { display: none; }
  .slide video.mobile  { display: block; }

  .logo { font-size: clamp(40px, 14vw, 64px); }

  .logo-row { padding-top: 20px; }

  .main-nav a { margin-right: 18px; font-size: 9px; letter-spacing: 0.14em; }

  .slide-info  { bottom: 56px; left: 20px; }
  .pagination  { bottom: 54px; gap: 16px; }
  .site-footer { padding: 0 20px; }
}
</style>
</head>
<body>

<!-- ── HEADER ───────────────────────── -->
<header class="site-header" id="siteHeader">
  <div class="logo-row">
    <a href="/" class="logo">BillJobs</a>
  </div>
  <nav class="main-nav">
    <a href="who-is.html">Who Is</a>
    <a href="mailto:contact@billjobs.it">Contact</a>
  </nav>
  <div class="filter-nav" id="filterNav">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="music">Music</button>
    <button class="filter-btn" data-filter="fashion">Fashion</button>

<!-- ── PROJECT INFO ──────────────────── -->
<div class="slide-info" id="slideInfo">
  <span class="info-client" id="infoClient"></span>
  <span class="info-title" id="infoTitle"></span>
</div>

<!-- ── PAGINATION ───────────────────── -->

<!-- ── PROGRESS BAR ─────────────────── -->
<div class="progress-bar" id="progressBar"></div>

<!-- ── FOOTER ───────────────────────── -->

  <a href="#" class="footer-link">Italy</a>
  <a href="mailto:contact@billjobs.it" class="footer-link">Contact</a>
  <a href="https://www.instagram.com/billjobs_production" target="_blank" rel="noopener" class="footer-link">Instagram</a>
</footer>

<script>
(function () {
  const allSlides   = Array.from(document.querySelectorAll('.slide'));
  const pagination  = document.getElementById('pagination');
  const infoClient  = document.getElementById('infoClient');
  const infoTitle   = document.getElementById('infoTitle');
  const progressBar = document.getElementById('progressBar');
  const filterBtns  = Array.from(document.querySelectorAll('.filter-btn'));
  const DURATION    = 6000;

  let activeFilter  = 'all';
  let pool          = allSlides.slice(); // slides visible in current filter
  let currentIdx    = 0;                // index within pool
  let timer         = null;

  // ── Filtering ────────────────────────────────────────
  function applyFilter(filter) {
    activeFilter = filter;

    // Update filter button states
    filterBtns.forEach(b => b.classList.toggle('active', b.dataset.filter === filter));

    // Hide all, show matching
    allSlides.forEach(s => {
      const match = filter === 'all' || s.dataset.category === filter;
      s.style.display = match ? '' : 'none';
      if (!match) s.classList.remove('active');
    });

    pool = allSlides.filter(s => s.style.display !== 'none');

    rebuildPagination();
    goTo(0, true);
  }

  // ── Pagination ───────────────────────────────────────
  function rebuildPagination() {
    pagination.innerHTML = '';
    pool.forEach((_, i) => {
      const btn = document.createElement('button');
      btn.className = 'page-btn' + (i === 0 ? ' active' : '');
      btn.textContent = i + 1;
      btn.addEventListener('click', () => goTo(i, true));
      pagination.appendChild(btn);
    });
  }

  function pageBtns() {
    return Array.from(pagination.querySelectorAll('.page-btn'));
  }

  // ── Info label ───────────────────────────────────────
  function updateInfo(slide) {
    const client = slide.dataset.client || '';
    const title  = slide.dataset.title  || '';
    const info   = document.getElementById('slideInfo');
    info.classList.remove('visible');
    setTimeout(() => {
      infoClient.textContent = client;
      infoTitle.textContent  = title;
      if (client || title) info.classList.add('visible');
    }, 300);
  }

  // ── Progress bar ─────────────────────────────────────
  function startProgress() {
    progressBar.style.transition = 'none';
    progressBar.style.width = '0%';
    progressBar.offsetWidth; // reflow
    progressBar.style.transition = `width ${DURATION}ms linear`;
    progressBar.style.width = '100%';
  }

  // ── Go to slide (index in pool) ───────────────────────
  function goTo(idx, userClick) {
    const btns = pageBtns();

    // Deactivate current
    if (pool[currentIdx]) {
      pool[currentIdx].classList.remove('active');
      const oldVid = pool[currentIdx].querySelector(
        window.innerWidth <= 767 ? 'video.mobile' : 'video.desktop'
      );
      if (oldVid) oldVid.pause();
    }
    if (btns[currentIdx]) btns[currentIdx].classList.remove('active');

    currentIdx = ((idx % pool.length) + pool.length) % pool.length;

    // Activate new
    if (pool[currentIdx]) {
      pool[currentIdx].classList.add('active');
      const newVid = pool[currentIdx].querySelector(
        window.innerWidth <= 767 ? 'video.mobile' : 'video.desktop'
      );
      if (newVid) { newVid.currentTime = 0; newVid.play().catch(() => {}); }
      updateInfo(pool[currentIdx]);
    }
    if (btns[currentIdx]) btns[currentIdx].classList.add('active');

    startProgress();
    clearTimeout(timer);
    timer = setTimeout(next, DURATION);
  }

  function next() { goTo(currentIdx + 1, false); }

  // ── Filter button clicks ─────────────────────────────
  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => applyFilter(btn.dataset.filter));
  });

  // ── Keyboard ─────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') goTo(currentIdx + 1, true);
    if (e.key === 'ArrowLeft')  goTo(currentIdx - 1, true);
  });

  // ── Touch swipe ──────────────────────────────────────
  let touchStartX = 0;
  document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) goTo(dx < 0 ? currentIdx + 1 : currentIdx - 1, true);
  }, { passive: true });

  // ── Init ─────────────────────────────────────────────
  function init() {
    document.getElementById('siteHeader').classList.add('visible');
    document.getElementById('siteFooter').classList.add('visible');
    document.getElementById('pagination').classList.add('visible');
    rebuildPagination();
    goTo(0, true);
  }

  setTimeout(init, 400);
})();
</script>
