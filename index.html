<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black: #000;
  --white: #fff;
  --grey: rgba(255,255,255,0.45);
  --font-ui: 'Space Grotesk', -apple-system, sans-serif;
  --font-ed: 'DM Serif Display', Georgia, serif;
}

html, body {
  width: 100%; height: 100%;
  background: var(--black);
  color: var(--white);
  font-family: var(--font-ui);
  -webkit-font-smoothing: antialiased;
  overflow: hidden; /* lock scroll on homepage */
}

a { color: inherit; text-decoration: none; }

/* ─────────────────────────────────────────
   SLIDESHOW
───────────────────────────────────────── */
.slideshow {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: #000;
}

.slide {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 1.2s ease;
  pointer-events: none;
  background: #000;
}

.slide.active {
  opacity: 1;
  pointer-events: all;
}

/* Gradient overlay — darker at top for logo legibility */
.slide::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to bottom,
      rgba(0,0,0,0.55) 0%,
      rgba(0,0,0,0.05) 35%,
      rgba(0,0,0,0.05) 60%,
      rgba(0,0,0,0.65) 100%);
  z-index: 1;
}

/* Video fills the slide */
.slide video {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  background: #000;
}

/* On mobile show portrait video, hide landscape */
.slide video.desktop { display: block; }
.slide video.mobile  { display: none; }

/* Placeholder background when no video yet */
.slide-bg {
  position: absolute;
  inset: 0;
  background: #0a0a0a;
}

/* ─────────────────────────────────────────
   HEADER — fixed overlay
───────────────────────────────────────── */
.site-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 0 5vw;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.6s ease;
}

.site-header.visible {
  opacity: 1;
  pointer-events: all;
}

/* Logo row */
.logo-row {
  display: flex;
  align-items: center;
  gap: 24px;
  padding-top: 20px;
}

.logo-img-link {
  display: inline-block;
  cursor: pointer;
}

.logo-img {
  height: clamp(60px, 8vw, 100px);
  width: auto;
  display: block;
  filter: brightness(0) invert(1);
}

.voice-btn {
  font-family: var(--font-ui);
  font-size: clamp(12px, 1.3vw, 16px);
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--white);
  text-decoration: none;
  cursor: pointer;
  animation: voiceGlow 2.5s ease-in-out infinite;
  white-space: nowrap;
}

@keyframes voiceGlow {
  0%, 100% { text-shadow: 0 0 6px rgba(255,255,255,0.4); opacity: 0.8; transform: scale(1); }
  50%       { text-shadow: 0 0 22px rgba(255,255,255,1), 0 0 44px rgba(255,255,255,0.35); opacity: 1; transform: scale(1.06); }
}

/* Nav row */
.main-nav {
  display: flex;
  gap: 0;
  padding-top: 6px;
  padding-bottom: 0;
}

.main-nav a {
  font-size: clamp(9px, 1vw, 11px);
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--grey);
  margin-right: 28px;
  transition: color 0.2s;
}

.main-nav a:hover { color: var(--white); }

/* Filter row — categories */
.filter-nav {
  display: flex;
  gap: 0;
  padding-top: 10px;
}

.filter-btn {
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
  font-family: var(--font-ui);
  font-size: clamp(11px, 1.2vw, 14px);
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--grey);
  margin-right: 28px;
  transition: color 0.2s;
  position: relative;
}

.filter-btn::after {
  content: '';
  position: absolute;
  bottom: -3px;
  left: 0; right: 0;
  height: 1px;
  background: var(--white);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.25s ease;
}

.filter-btn.active { color: var(--white); }
.filter-btn.active::after { transform: scaleX(1); }
.filter-btn:hover { color: rgba(255,255,255,0.7); }

/* ─────────────────────────────────────────
   PROJECT INFO — bottom left
───────────────────────────────────────── */
.slide-info {
  position: fixed;
  bottom: 100px;
  left: 5vw;
  z-index: 100;
  opacity: 0;
  transition: opacity 0.55s ease, transform 0.55s ease;
  transform: translateY(14px);
}

.slide-info.visible {
  opacity: 1;
  transform: translateY(0);
}

.info-client {
  display: block;
  font-size: clamp(16px, 2vw, 26px);
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--white);
  line-height: 1.15;
  margin-bottom: 4px;
}

.info-title {
  display: block;
  font-size: clamp(13px, 1.5vw, 20px);
  font-weight: 300;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--grey);
  line-height: 1.15;
}

/* ─────────────────────────────────────────
   PAGINATION — bottom center
───────────────────────────────────────── */
.pagination {
  position: fixed;
  bottom: 48px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 20px;
  opacity: 0;
  transition: opacity 0.6s ease;
}

.pagination.visible { opacity: 1; }

.page-btn {
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
  font-family: var(--font-ui);
  font-size: clamp(10px, 1vw, 12px);
  font-weight: 400;
  letter-spacing: 0.06em;
  color: var(--grey);
  transition: color 0.25s;
  line-height: 1;
}

.page-btn.active  { color: var(--white); font-weight: 600; }
.page-btn:hover   { color: rgba(255,255,255,0.7); }
.page-btn.loading { color: var(--white); animation: btnPulse 0.7s ease-in-out infinite alternate; }
@keyframes btnPulse { from { opacity: 0.25; } to { opacity: 1; } }

/* Progress bar below active number */
.page-btn::after {
  content: '';
  display: block;
  height: 1px;
  background: var(--white);
  margin-top: 4px;
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s ease;
}

.page-btn.active::after { transform: scaleX(1); }

/* ─────────────────────────────────────────
   AUTO-PROGRESS BAR
───────────────────────────────────────── */
.progress-bar {
  position: fixed;
  bottom: 0; left: 0;
  height: 2px;
  width: 0%;
  background: rgba(255,255,255,0.6);
  z-index: 100;
  transition: none;
}

/* ─────────────────────────────────────────
   FOOTER STRIP — very bottom
───────────────────────────────────────── */
.site-footer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 5vw;
  height: 40px;
  border-top: 1px solid rgba(255,255,255,0.08);
  opacity: 0;
  transition: opacity 0.6s ease;
}

.site-footer.visible { opacity: 1; }

.footer-link {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--grey);
  transition: color 0.2s;
}
.footer-link:hover { color: var(--white); }

/* ─────────────────────────────────────────
   LOADER
───────────────────────────────────────── */
#loader {
  position: fixed;
  inset: 0;
  z-index: 500;
  background: #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 32px;
  transition: opacity 0.9s ease;
  cursor: pointer;
}

#loader.hidden {
  opacity: 0;
  pointer-events: none;
}

.loader-logo {
  width: 72px;
  height: auto;
  opacity: 0;
  animation: loaderPulse 1.2s ease-in-out infinite alternate;
}

.loader-hint {
  font-family: var(--font-ui);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  animation: loaderPulse 1.2s ease-in-out infinite alternate;
}

@keyframes loaderPulse {
  from { opacity: 0.3; }
  to   { opacity: 0.8; }
}

.loader-dots {
  display: flex;
  gap: 7px;
}
.loader-dots span {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: rgba(255,255,255,0.4);
  animation: dotPulse 1.3s ease-in-out infinite;
}
.loader-dots span:nth-child(2) { animation-delay: 0.22s; }
.loader-dots span:nth-child(3) { animation-delay: 0.44s; }
@keyframes dotPulse {
  0%, 80%, 100% { opacity: 0.2; transform: scale(0.7); }
  40%           { opacity: 1;   transform: scale(1);   }
}

/* Buffer dots — centered overlay during video loading */
.buffer-dots {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 99;
  display: flex;
  gap: 9px;
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
}
.buffer-dots.visible { opacity: 1; }
.buffer-dots span {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: rgba(255,255,255,0.55);
  animation: dotPulse 1.3s ease-in-out infinite;
}
.buffer-dots span:nth-child(2) { animation-delay: 0.22s; }
.buffer-dots span:nth-child(3) { animation-delay: 0.44s; }

/* ─────────────────────────────────────────
   MOBILE
───────────────────────────────────────── */
@media (max-width: 767px) {
  .slide video.desktop { display: none; }
  .slide video.mobile  { display: block; }

  .logo-img { height: clamp(48px, 12vw, 72px); }

  .logo-row { padding-top: 20px; }

  .main-nav a { margin-right: 18px; font-size: 9px; letter-spacing: 0.14em; }

  /* Filter bar scrollable on mobile */
  .filter-nav {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 4px;
  }
  .filter-nav::-webkit-scrollbar { display: none; }
  .filter-btn { font-size: 10px; letter-spacing: 0.1em; margin-right: 18px; white-space: nowrap; }

  /* Slide info — higher so it doesn't overlap pagination */
  .slide-info { bottom: 100px; left: 20px; }
  .info-client { font-size: clamp(20px, 5.5vw, 28px); }
  .info-title  { font-size: clamp(14px, 3.8vw, 20px); }

  /* Pagination just above footer */
  .pagination  { bottom: 48px; gap: 10px; }

  .site-footer { padding: 0 20px; }
  .footer-link { font-size: 11px; }
}
</style>
</head>

</footer>

<script>
(function () {
  const allSlides  = Array.from(document.querySelectorAll('.slide'));
  const pagination = document.getElementById('pagination');
  const progressBar= document.getElementById('progressBar');
  const filterBtns = Array.from(document.querySelectorAll('.filter-btn'));
  const loader      = document.getElementById('loader');
  const bufferDots  = document.getElementById('bufferDots');
  const isMob       = () => window.innerWidth <= 767;

  let pool         = [];
  let currentIdx   = 0;

  function getVid(slide) {
    return slide.querySelector(isMob() ? 'video.mobile' : 'video.desktop');
  }

  // ── Progress bar — segue la durata reale del video ────
  let progressInterval = null;
  function startProgress(vid) {
    progressBar.style.transition = 'none';
    progressBar.style.width = '0%';
    clearInterval(progressInterval);
    progressInterval = setInterval(() => {
      if (vid && vid.duration && !isNaN(vid.duration)) {
        progressBar.style.width = (vid.currentTime / vid.duration * 100) + '%';
      }
    }, 100);
  }

  // ── Precarica il video successivo ────────────────────
  function preloadNext() {
    const nextSlide = pool[(currentIdx + 1) % pool.length];
    if (!nextSlide) return;
    const v = getVid(nextSlide);
    if (v && v.preload !== 'auto') {
      v.preload = 'auto';
      v.load();
    }
  }

  let skipTimer = null;

  // ── Sliding pagination window (max 9 numbers) ─────────
  const PAGE_WINDOW = 9;

  function buildPageWindow() {
    pagination.innerHTML = '';
    const n = pool.length;
    if (n === 0) return;
    const w = Math.min(PAGE_WINDOW, n);
    const half = Math.floor(w / 2);
    let start = Math.max(0, currentIdx - half);
    let end   = start + w - 1;
    if (end >= n) { end = n - 1; start = Math.max(0, end - w + 1); }
    for (let i = start; i <= end; i++) {
      const btn = document.createElement('button');
      btn.className = 'page-btn' + (i === currentIdx ? ' active' : '');
      btn.textContent = i + 1;
      btn.addEventListener('click', () => goTo(i));
      pagination.appendChild(btn);
    }
  }

  function rebuildPagination() { buildPageWindow(); }

  // ── Vai a slide (idx nel pool) ────────────────────────
  function goTo(idx) {
    clearInterval(progressInterval);
    clearTimeout(skipTimer);

    if (pool[currentIdx]) {
      const oldVid = getVid(pool[currentIdx]);
      if (oldVid) oldVid.pause();
      pool[currentIdx].classList.remove('active');
    }

    currentIdx = ((idx % pool.length) + pool.length) % pool.length;
    const slide = pool[currentIdx];
    slide.classList.add('active');
    buildPageWindow();

    const info = document.getElementById('slideInfo');
    info.classList.remove('visible');
    setTimeout(() => {
      document.getElementById('infoClient').textContent = slide.dataset.client || '';
      document.getElementById('infoTitle').textContent  = slide.dataset.title  || '';
      if (slide.dataset.client || slide.dataset.title) info.classList.add('visible');
    }, 300);

    const vid = getVid(slide);
    preloadNext();

    if (!vid) return;

    vid.currentTime = 0;
    startProgress(vid);

    vid.addEventListener('ended', () => goTo(currentIdx + 1), { once: true });

    const tryPlay = () => {
      clearTimeout(skipTimer);
      bufferDots.classList.remove('visible');
      const ab = pagination.querySelector('.page-btn.active');
      if (ab) ab.classList.remove('loading');
      vid.play().catch(() => {});
    };

    if (vid.readyState >= 2) {
      tryPlay();
    } else {
      vid.preload = 'auto';
      vid.load();
      bufferDots.classList.add('visible');
      const ab = pagination.querySelector('.page-btn.active');
      if (ab) ab.classList.add('loading');
      vid.addEventListener('canplay', tryPlay, { once: true });
      skipTimer = setTimeout(() => {
        bufferDots.classList.remove('visible');
        const ab2 = pagination.querySelector('.page-btn.active');
        if (ab2) ab2.classList.remove('loading');
        goTo(currentIdx + 1);
      }, 8000);
    }
  }

  // ── Filtri ────────────────────────────────────────────
  function applyFilter(filter) {
    filterBtns.forEach(b => b.classList.toggle('active', b.dataset.filter === filter));

    if (pool[currentIdx]) {
      const v = getVid(pool[currentIdx]);
      if (v) v.pause();
      pool[currentIdx].classList.remove('active');
    }

    allSlides.forEach(s => {
      const has  = s.dataset.category !== '';
      const show = has && (filter === 'all' || s.dataset.category === filter);
      s.style.display = show ? '' : 'none';
      if (!show) s.classList.remove('active');
    });

    pool = allSlides.filter(s => s.style.display !== 'none');
    currentIdx = 0;
    buildPageWindow();
    goTo(0);
  }

  // ── Tastiera ──────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') goTo(currentIdx + 1);
    if (e.key === 'ArrowLeft')  goTo(currentIdx - 1);
  });

  // ── Swipe + tap per avanzare ──────────────────────────
  let tx = 0, ty = 0;
  document.addEventListener('touchstart', e => {
    tx = e.touches[0].clientX;
    ty = e.touches[0].clientY;
  }, { passive: true });
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - tx;
    const dy = e.changedTouches[0].clientY - ty;
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
      // swipe orizzontale
      goTo(dx < 0 ? currentIdx + 1 : currentIdx - 1);
    } else if (Math.abs(dx) < 10 && Math.abs(dy) < 10 && !e.target.closest('button, a')) {
      // tap fermo sul video — avanza
      goTo(currentIdx + 1);
    }
  }, { passive: true });

  // ── Filtri click ──────────────────────────────────────
  filterBtns.forEach(b => b.addEventListener('click', () => applyFilter(b.dataset.filter)));

  // ── Init ─────────────────────────────────────────────
  function init() {
    allSlides.forEach(s => {
      if (s.dataset.category === '') s.style.display = 'none';
    });
    pool = allSlides.filter(s => s.style.display !== 'none');
    rebuildPagination();

    const firstVid = getVid(pool[0]);
    if (!firstVid) return;

    let started = false;
    const startAll = () => {
      if (started) return;
      started = true;
      loader.classList.add('hidden');
      document.getElementById('siteHeader').classList.add('visible');
      document.getElementById('siteFooter').classList.add('visible');
      document.getElementById('pagination').classList.add('visible');
      goTo(0);
    };

    // Tap on loader — play() subito per catturare la gesture iOS
    loader.addEventListener('click', () => {
      if (firstVid) firstVid.play().catch(() => {});
      startAll();
    }, { once: true });

    if (firstVid.readyState >= 2) {
      startAll();
      return;
    }

    // canplay = abbastanza dati per riprodurre
    firstVid.addEventListener('canplay', startAll, { once: true });
    // loadeddata = primo frame disponibile (più rapido)
    firstVid.addEventListener('loadeddata', startAll, { once: true });
    // Fallback: parte comunque dopo 4 secondi
    setTimeout(startAll, 4000);
  }

  init();
})();
</script>
