<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black: #000;
  --white: #fff;
  --grey: rgba(255,255,255,0.45);
  --font-ui: 'Space Grotesk', -apple-system, sans-serif;
  --font-ed: 'DM Serif Display', Georgia, serif;
}

html, body {
  width: 100%; height: 100%;
  background: var(--black);
  color: var(--white);
  font-family: var(--font-ui);
  -webkit-font-smoothing: antialiased;
  overflow: hidden; /* lock scroll on homepage */
}

a { color: inherit; text-decoration: none; }

/* ─────────────────────────────────────────
   SLIDESHOW
───────────────────────────────────────── */
.slideshow {
  position: fixed;
  inset: 0;
  z-index: 0;
}

.slide {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 1.2s ease;
  pointer-events: none;
}

.slide.active {
  opacity: 1;
  pointer-events: all;
}

/* Gradient overlay — darker at top for logo legibility */
.slide::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to bottom,
      rgba(0,0,0,0.55) 0%,
      rgba(0,0,0,0.05) 35%,
      rgba(0,0,0,0.05) 60%,
      rgba(0,0,0,0.65) 100%);
  z-index: 1;
}

/* Video fills the slide */
.slide video {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
}

/* On mobile show portrait video, hide landscape */
.slide video.desktop { display: block; }
.slide video.mobile  { display: none; }

/* Placeholder background when no video yet */
.slide-bg {
  position: absolute;
  inset: 0;
  background: #0a0a0a;
}

/* ─────────────────────────────────────────
   HEADER — fixed overlay
───────────────────────────────────────── */
.site-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 0 5vw;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.6s ease;
}

.site-header.visible {
  opacity: 1;
  pointer-events: all;
}

/* Logo row */
.logo-row {
  display: flex;
  align-items: baseline;
  padding-top: 24px;
}

.logo {
  font-family: var(--font-ui);
  font-size: clamp(48px, 12vw, 130px);
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1;
  color: var(--white);
  text-transform: uppercase;
  cursor: pointer;
}

/* Nav row */
.main-nav {
  display: flex;
  gap: 0;
  padding-top: 6px;
  padding-bottom: 0;
}

.main-nav a {
  font-size: clamp(9px, 1vw, 11px);
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--grey);
  margin-right: 28px;
  transition: color 0.2s;
}

.main-nav a:hover { color: var(--white); }

/* ─────────────────────────────────────────
   PROJECT INFO — bottom left
───────────────────────────────────────── */
.slide-info {
  position: fixed;
  bottom: 52px;
  left: 5vw;
  z-index: 100;
  opacity: 0;
  transition: opacity 0.4s ease, transform 0.4s ease;
  transform: translateY(6px);
}

.slide-info.visible {
  opacity: 1;
  transform: translateY(0);
}

.info-client {
  font-size: clamp(11px, 1.1vw, 13px);
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--white);
  display: inline;
  margin-right: 8px;
}

.info-title {
  font-size: clamp(11px, 1.1vw, 13px);
  font-weight: 300;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--grey);
  display: inline;
}

/* ─────────────────────────────────────────
   PAGINATION — bottom center
───────────────────────────────────────── */
.pagination {
  position: fixed;
  bottom: 48px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 20px;
  opacity: 0;
  transition: opacity 0.6s ease;
}

.pagination.visible { opacity: 1; }

.page-btn {
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
  font-family: var(--font-ui);
  font-size: clamp(10px, 1vw, 12px);
  font-weight: 400;
  letter-spacing: 0.06em;
  color: var(--grey);
  transition: color 0.25s;
  line-height: 1;
}

.page-btn.active { color: var(--white); font-weight: 600; }
.page-btn:hover  { color: rgba(255,255,255,0.7); }

/* Progress bar below active number */
.page-btn::after {
  content: '';
  display: block;
  height: 1px;
  background: var(--white);
  margin-top: 4px;
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s ease;
}

.page-btn.active::after { transform: scaleX(1); }

/* ─────────────────────────────────────────
   AUTO-PROGRESS BAR
───────────────────────────────────────── */
.progress-bar {
  position: fixed;
  bottom: 0; left: 0;
  height: 2px;
  width: 0%;
  background: rgba(255,255,255,0.6);
  z-index: 100;
  transition: none;
}

/* ─────────────────────────────────────────
   FOOTER STRIP — very bottom
───────────────────────────────────────── */
.site-footer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 5vw;
  height: 40px;
  border-top: 1px solid rgba(255,255,255,0.08);
  opacity: 0;
  transition: opacity 0.6s ease;
}

.site-footer.visible { opacity: 1; }

.footer-link {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--grey);
  transition: color 0.2s;
}
.footer-link:hover { color: var(--white); }

/* ─────────────────────────────────────────
   MOBILE
───────────────────────────────────────── */
@media (max-width: 767px) {
  .slide video.desktop { display: none; }
  .slide video.mobile  { display: block; }

  .logo { font-size: clamp(40px, 14vw, 64px); }

  .logo-row { padding-top: 20px; }

  .main-nav a { margin-right: 18px; font-size: 9px; letter-spacing: 0.14em; }

  .slide-info  { bottom: 56px; left: 20px; }
  .pagination  { bottom: 54px; gap: 16px; }
  .site-footer { padding: 0 20px; }
}
</style>

<script>
(function () {
  const slides      = Array.from(document.querySelectorAll('.slide'));
  const pagination  = document.getElementById('pagination');
  const infoClient  = document.getElementById('infoClient');
  const infoTitle   = document.getElementById('infoTitle');
  const progressBar = document.getElementById('progressBar');
  const DURATION    = 6000; // ms per slide
  let current       = 0;
  let timer         = null;
  let progTimer     = null;

  // Build pagination buttons
  slides.forEach((_, i) => {
    const btn = document.createElement('button');
    btn.className = 'page-btn' + (i === 0 ? ' active' : '');
    btn.textContent = i + 1;
    btn.addEventListener('click', () => goTo(i, true));
    pagination.appendChild(btn);
  });

  const pageBtns = Array.from(pagination.querySelectorAll('.page-btn'));

  function updateInfo(idx) {
    const s = slides[idx];
    const client = s.dataset.client || '';
    const title  = s.dataset.title  || '';
    const info   = document.getElementById('slideInfo');

    // Fade out → update → fade in
    info.classList.remove('visible');
    setTimeout(() => {
      infoClient.textContent = client;
      infoTitle.textContent  = title ? (client ? title : title) : '';
      if (client || title) info.classList.add('visible');
    }, 300);
  }

  function startProgress() {
    clearInterval(progTimer);
    progressBar.style.transition = 'none';
    progressBar.style.width = '0%';
    // Force reflow
    progressBar.offsetWidth;
    progressBar.style.transition = `width ${DURATION}ms linear`;
    progressBar.style.width = '100%';
  }

  function goTo(idx, userClick) {
    if (idx === current && !userClick) return;

    slides[current].classList.remove('active');
    pageBtns[current].classList.remove('active');

    // Pause old video, play new one
    const oldVid = slides[current].querySelector('video:not([style*="none"])') ||
                   slides[current].querySelector('video.desktop') ||
                   slides[current].querySelector('video.mobile');
    if (oldVid) oldVid.pause();

    current = idx;
    slides[current].classList.add('active');
    pageBtns[current].classList.add('active');

    // Play new video
    const isMobile = window.innerWidth <= 767;
    const newVid = isMobile
      ? slides[current].querySelector('video.mobile')
      : slides[current].querySelector('video.desktop');
    if (newVid) { newVid.currentTime = 0; newVid.play().catch(() => {}); }

    updateInfo(current);
    startProgress();

    clearTimeout(timer);
    timer = setTimeout(next, DURATION);
  }

  function next() {
    goTo((current + 1) % slides.length, false);
  }

  // Keyboard navigation
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') goTo((current + 1) % slides.length, true);
    if (e.key === 'ArrowLeft')  goTo((current - 1 + slides.length) % slides.length, true);
  });

  // Touch swipe
  let touchStartX = 0;
  document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) {
      goTo(dx < 0
        ? (current + 1) % slides.length
        : (current - 1 + slides.length) % slides.length,
        true);
    }
  }, { passive: true });

  // Init
  function init() {
    document.getElementById('siteHeader').classList.add('visible');
    document.getElementById('siteFooter').classList.add('visible');
    document.getElementById('pagination').classList.add('visible');
    updateInfo(0);
    startProgress();
    timer = setTimeout(next, DURATION);
  }

  // Small delay for entrance feel
  setTimeout(init, 400);
})();
</script>
