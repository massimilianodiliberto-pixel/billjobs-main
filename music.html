<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black: #000;
  --card-bg: #0d0d0d;
  --white: #fff;
  --grey: rgba(255,255,255,0.45);
  --font-ui: 'Space Grotesk', -apple-system, sans-serif;
  --font-ed: 'DM Serif Display', Georgia, serif;
}

html {
  background: var(--black);
  color: var(--white);
  font-family: var(--font-ui);
  -webkit-font-smoothing: antialiased;
  scroll-behavior: smooth;
}

body {
  min-height: 100vh;
  background: var(--black);
}

a { color: inherit; text-decoration: none; }

/* ─────────────────────────────────────────
   HEADER — fixed overlay
───────────────────────────────────────── */
.site-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 0 5vw;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding-top: 24px;
  padding-bottom: 18px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0) 100%);
}

.logo {
  font-family: var(--font-ui);
  font-size: clamp(28px, 4vw, 52px);
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1;
  color: var(--white);
  text-transform: uppercase;
}

.main-nav {
  display: flex;
  align-items: center;
  gap: 0;
}

.main-nav a {
  font-size: clamp(9px, 1vw, 11px);
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--grey);
  margin-left: 28px;
  transition: color 0.2s;
}

.main-nav a:hover { color: var(--white); }
.main-nav a.active { color: var(--white); }

/* ─────────────────────────────────────────
   PAGE CONTENT
───────────────────────────────────────── */
.page-content {
  padding-top: 120px;
  padding-bottom: 80px;
  padding-left: 5vw;
  padding-right: 5vw;
}

/* ─────────────────────────────────────────
   CATEGORY TITLE SECTION
───────────────────────────────────────── */
.category-hero {
  padding-top: 40px;
  padding-bottom: 56px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  margin-bottom: 64px;
}

.category-title {
  font-family: var(--font-ed);
  font-size: clamp(72px, 12vw, 160px);
  font-weight: 400;
  line-height: 0.92;
  letter-spacing: -0.01em;
  color: var(--white);
  margin-bottom: 20px;
}

.category-subtitle {
  font-family: var(--font-ui);
  font-size: clamp(10px, 1.1vw, 12px);
  font-weight: 400;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  font-variant: small-caps;
  color: var(--grey);
}

/* ─────────────────────────────────────────
   PROJECTS GRID
───────────────────────────────────────── */
.projects-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px;
}

/* ─────────────────────────────────────────
   PROJECT CARD
───────────────────────────────────────── */
.project-card {
  position: relative;
  background: var(--card-bg);
  aspect-ratio: 16 / 9;
  overflow: hidden;
  cursor: pointer;
  display: block;
}

/* Watermark project number */
.card-number {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: var(--font-ed);
  font-size: clamp(80px, 12vw, 160px);
  font-weight: 400;
  color: rgba(255,255,255,0.04);
  line-height: 1;
  user-select: none;
  pointer-events: none;
  z-index: 1;
  transition: color 0.4s ease;
}

.project-card:hover .card-number {
  color: rgba(255,255,255,0.07);
}

/* Bottom overlay with client + title */
.card-overlay {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 3;
  padding: 20px 20px 18px;
  background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0) 100%);
  display: flex;
  flex-direction: column;
  gap: 4px;
  transform: translateY(4px);
  opacity: 0.7;
  transition: opacity 0.3s ease, transform 0.3s ease;
}

.project-card:hover .card-overlay {
  opacity: 1;
  transform: translateY(0);
}

.card-client {
  font-size: clamp(9px, 0.9vw, 11px);
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--white);
  line-height: 1;
}

.card-title {
  font-size: clamp(9px, 0.9vw, 11px);
  font-weight: 300;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--grey);
  line-height: 1;
}

/* Play icon — center on hover */
.card-play {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.75);
  z-index: 4;
  width: 52px;
  height: 52px;
  border: 1.5px solid rgba(255,255,255,0.55);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.3s ease, transform 0.3s ease;
  pointer-events: none;
}

.card-play::after {
  content: '';
  display: block;
  width: 0;
  height: 0;
  border-style: solid;
  border-width: 9px 0 9px 16px;
  border-color: transparent transparent transparent rgba(255,255,255,0.9);
  margin-left: 3px;
}

.project-card:hover .card-play {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

/* Subtle border on hover */
.project-card::after {
  content: '';
  position: absolute;
  inset: 0;
  border: 1px solid rgba(255,255,255,0);
  z-index: 5;
  transition: border-color 0.3s ease;
  pointer-events: none;
}

.project-card:hover::after {
  border-color: rgba(255,255,255,0.08);
}

/* ─────────────────────────────────────────
   FOOTER STRIP
───────────────────────────────────────── */
.site-footer {
  position: relative;
  z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 5vw;
  height: 40px;
  border-top: 1px solid rgba(255,255,255,0.08);
  margin-top: 80px;
}

.footer-link {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--grey);
  transition: color 0.2s;
}

.footer-link:hover { color: var(--white); }

/* ─────────────────────────────────────────
   TABLET
───────────────────────────────────────── */
@media (max-width: 1024px) {
  .projects-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

/* ─────────────────────────────────────────
   MOBILE
───────────────────────────────────────── */
@media (max-width: 767px) {
  .site-header {
    flex-direction: column;
    align-items: flex-start;
    padding-top: 20px;
    padding-bottom: 14px;
    gap: 8px;
  }

  .logo { font-size: clamp(28px, 8vw, 40px); }

  .main-nav {
    gap: 0;
    flex-wrap: wrap;
  }

  .main-nav a {
    margin-left: 0;
    margin-right: 18px;
    font-size: 9px;
    letter-spacing: 0.14em;
  }

  .page-content {
    padding-top: 130px;
    padding-left: 20px;
    padding-right: 20px;
  }

  .category-hero {
    padding-top: 24px;
    padding-bottom: 36px;
    margin-bottom: 36px;
  }

  .projects-grid {
    grid-template-columns: 1fr;
    gap: 2px;
  }

  .card-overlay {
    opacity: 1;
    transform: none;
  }

  .site-footer {
    padding: 0 20px;
    margin-top: 40px;
  }
}
</style>
</head>
